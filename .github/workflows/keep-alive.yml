name: Keep backend alive

on:
  schedule:
    # Every 10 minutes - comfortably under Render free tier's 15-minute
    # sleep-after-inactivity threshold, with margin for GitHub's scheduling delay.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -sf --retry 2 --retry-delay 15 --max-time 150 https://smartretail-backend.onrender.com/health
